    <title>AsaanDoc | Pakistan's Healthcare Platform</title>

    <style>
      * { -webkit-tap-highlight-color: transparent; }
      body { margin: 0; font-family: Inter, -apple-system, BlinkMacSystemFont, sans-serif; }
      #root { min-height: 100vh; }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run AsaanDoc.</noscript>
    <div id="root"></div>
   
      
      <script>
  // Unregister all old service workers to fix cache issues
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.getRegistrations().then(registrations => {
      registrations.forEach(reg => {
        reg.unregister();
        console.log('SW unregistered:', reg.scope);
      });
    });
    // Clear all caches
    if ('caches' in window) {
      caches.keys().then(keys => {
        keys.forEach(key => {
          caches.delete(key);
          console.log('Cache cleared:', key);
        });
      });
    }
  }
</script>
  </body>
</html>
